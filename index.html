<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moliya Bozori Viktorinasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Telegram kabi bosilganda knopkalar reaksiyasi uchun */
        .btn-option { transition: all 0.2s ease-in-out; }
        .correct { background-color: #10B981 !important; color: white !important; border-color: #10B981 !important; }
        .wrong { background-color: #EF4444 !important; color: white !important; border-color: #EF4444 !important; animation: shake 0.4s; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden p-6 relative min-h-[400px]">

        <div id="home-screen" class="block">
            <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">Moliya Bozori Viktorinasi</h1>
            <p class="text-gray-500 text-center mb-6">Testni boshlash uchun bo'limni tanlang:</p>
            <div id="batches-container" class="grid grid-cols-2 gap-4">
                </div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="flex justify-between items-center mb-4 text-sm font-semibold text-gray-500">
                <span id="question-progress">1/30</span>
                <span id="score-display" class="text-blue-500">To'g'ri: 0</span>
            </div>
            <h2 id="question-text" class="text-lg font-bold mb-6 text-gray-800">Savol matni shu yerda bo'ladi?</h2>
            <div id="options-container" class="flex flex-col space-y-3">
                </div>
        </div>

        <div id="result-screen" class="hidden text-center mt-10">
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Test yakunlandi!</h2>
            <p class="text-gray-500 mb-6">Sizning natijangiz:</p>
            <div class="text-5xl font-extrabold text-blue-600 mb-8" id="final-score">0/30</div>
            <button onclick="goHome()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200">
                Bosh sahifaga qaytish
            </button>
        </div>

    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
